# fly.toml - Fly.io configuration for SquishMark
# See https://fly.io/docs/reference/configuration/ for documentation

app = "squishmark"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"
  build-target = "prod"

[env]
  # Four slashes: an absolute path targeting the mounted /data volume.
  # Three would be relative to the workdir and skip the mount.
  DATABASE_URL = "sqlite+aiosqlite:////data/squishmark.db"
  CACHE_TTL_SECONDS = "300"
  # Set GITHUB_CONTENT_REPO via `fly secrets set` (see the deploy guide).

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # 0 keeps costs down; bump to 1 to keep the in-memory content cache warm
  # between visits.
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "squishmark_data"
  destination = "/data"
